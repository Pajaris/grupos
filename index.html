  <title>Pajaris – Grupo Exclusivo</title>

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;
    n.push=n;
    n.loaded=!0;
    n.version='2.0';
    n.queue=[];
    t=b.createElement(e);

    s.parentNode.insertBefore(t,s)}

  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2873019396377458&ev=PageView&noscript=1"/>
  </noscript>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root{
      --gold:#b8963e;
      --gold-light:#d4b06a;
      --gold-pale:#e8d5a8;
      --blue-deep:#1a2d42;
      --blue-pale:#8aa8c4;
      --bege:#f0e8d8;
      --ivory:#faf7f2;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Jost',sans-serif;
      background:var(--blue-deep);
      color:var(--bege);
      min-height:100vh;
      overflow-x:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top,#2d4a66 0%,transparent 40%),
      var(--blue-deep);
      z-index:-1;
    }

    .wrap{
      width:100%;
      max-width:520px;
      text-align:center;
    }

    .brand{
      font-family:'Cormorant Garamond',serif;
      font-size:72px;
      letter-spacing:.25em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .sub-brand{
      font-size:11px;
      letter-spacing:.45em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:40px;
    }

    .headline{
      font-family:'Cormorant Garamond',serif;
      font-size:42px;
      line-height:1.2;
      margin-bottom:18px;
      color:var(--ivory);
      font-style:italic;
    }

    .tagline{
      font-size:11px;
      line-height:2;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--blue-pale);
      margin-bottom:40px;
    }

    .wpp-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:#25d366;
      color:#fff;
      text-decoration:none;
      padding:18px 34px;
      letter-spacing:.28em;
      text-transform:uppercase;
      font-size:12px;
      transition:.25s;
      margin-bottom:34px;
      min-width:280px;
    }

    .wpp-btn:hover{
      transform:translateY(-2px);
      background:#1ebe5d;
    }

    .timer{
      margin-top:10px;
    }

    .timer-label{
      font-size:10px;
      letter-spacing:.35em;
      text-transform:uppercase;
      opacity:.7;
      margin-bottom:12px;
    }

    .seconds{
      font-size:72px;
      font-family:'Cormorant Garamond',serif;
      color:var(--ivory);
    }

    .small{
      margin-top:18px;
      font-size:11px;
      opacity:.7;
      letter-spacing:.15em;
      line-height:1.8;
    }

    .fallback{
      margin-top:22px;
      font-size:12px;
      color:var(--gold-light);
      opacity:.85;
    }

    @media(max-width:600px){

      .brand{
        font-size:54px;
      }

      .headline{
        font-size:34px;
      }

      .seconds{
        font-size:58px;
      }

      .wpp-btn{
        width:100%;
      }
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="brand">Pajaris</div>

  <div class="sub-brand">
    Brazilian Beachwear · Grupo Exclusivo
  </div>

  <h1 class="headline">
    Faça parte do nosso<br>
    círculo privado
  </h1>

  <p class="tagline">
    Lançamentos antecipados · ofertas exclusivas · moda praia premium
  </p>

  <a
    class="wpp-btn"
    id="wppBtn"
    href="https://chat.whatsapp.com/LcCOWHgej2U9tZUMgl16At?mode=gi_t"
    target="_blank"
    rel="noopener"
  >
    Entrar no Grupo VIP
  </a>

  <div class="timer">

    <div class="timer-label">
      Redirecionando automaticamente em
    </div>

    <div class="seconds" id="seconds">
      10
    </div>

  </div>

  <div class="small">
    Caso o WhatsApp não abra automaticamente,<br>
    clique no botão acima.
  </div>

  <div class="fallback">
    Grupo exclusivo Pajaris
  </div>

</div>

<script>

  const URL_WPP = 'https://chat.whatsapp.com/LcCOWHgej2U9tZUMgl16At?mode=gi_t';

  let total = 10;

  const seconds = document.getElementById('seconds');

  // evita múltiplos redirects
  let redirected = false;

  // clique manual
  document.getElementById('wppBtn').addEventListener('click', () => {

    fbq('track', 'Lead');

  });

  const timer = setInterval(() => {

    total--;

    seconds.innerText = total;

    if(total <= 0 && !redirected){

      redirected = true;

      clearInterval(timer);

      fbq('track', 'Lead');

      // delay pequeno melhora compatibilidade mobile
      setTimeout(() => {

        window.location.assign(URL_WPP);

      }, 300);

    }

  },1000);

</script>

</body>
</html>
